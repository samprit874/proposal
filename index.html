<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Shreya 💌</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --rose: #ff5d8f;
    --coral: #ff8a5b;
    --peach: #ffc98b;
    --plum: #4a1740;
    --deep-rose: #c81d5c;
    --cream: #fff6ef;
    --shadow: rgba(120, 20, 60, 0.25);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    font-family:'Quicksand', sans-serif;
    overflow:hidden;
  }

  body{
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    background: linear-gradient(135deg, var(--rose), var(--coral), var(--peach));
    background-size: 300% 300%;
    animation: gradientShift 12s ease infinite;
  }

  @keyframes gradientShift{
    0%{ background-position: 0% 40%; }
    50%{ background-position: 100% 60%; }
    100%{ background-position: 0% 40%; }
  }

  /* ambient floating hearts */
  .ambient{
    position: fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;
  }
  .ambient span{
    position:absolute; bottom:-40px; font-size: 20px; opacity:0.55;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.6; }
    100%{ transform: translateY(-110vh) translateX(var(--drift,20px)) rotate(360deg); opacity:0; }
  }

  .phone{
    position:relative; z-index:1;
    width: min(94vw, 380px);
    max-height: 92vh;
    border-radius: 34px;
    padding: 6px;
    background: rgba(255,255,255,0.18);
    box-shadow: 0 30px 60px var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.35);
    backdrop-filter: blur(6px);
  }

  .card{
    position:relative;
    border-radius: 28px;
    background: linear-gradient(160deg, rgba(255,246,239,0.14), rgba(255,246,239,0.05));
    border: 1px solid rgba(255,255,255,0.35);
    padding: 30px 26px 34px;
    color: var(--cream);
    text-align:center;
    overflow:hidden;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
  }

  .eyebrow{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Quicksand', sans-serif;
    font-weight:700; font-size: 12.5px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cream);
    background: rgba(255,255,255,0.16);
    border: 1px solid rgba(255,255,255,0.4);
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 22px;
  }

  .from-line{
    font-size: 14px;
    opacity: 0.92;
    margin: 0 0 14px;
    font-weight: 600;
  }

  h1{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-weight: 600;
    font-size: clamp(28px, 8vw, 34px);
    line-height: 1.18;
    margin: 0 0 8px;
    text-shadow: 0 2px 18px rgba(0,0,0,0.15);
  }

  .name{
    font-family:'Fraunces', serif;
    font-weight: 700;
    font-style: normal;
    font-size: clamp(24px, 7vw, 28px);
    margin: 4px 0 18px;
    color: #fff;
  }

  .subtext{
    font-size: 15px;
    opacity: 0.95;
    margin: 0 0 26px;
    font-weight: 500;
  }

  .dodge-zone{
    position: relative;
    min-height: 190px;
    margin-top: 6px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px dashed rgba(255,255,255,0.3);
    padding: 18px 16px 16px;
  }

  .hint{
    font-size: 13px;
    opacity: 0.85;
    margin: 0 0 16px;
    font-style: italic;
  }

  .btn-row{
    display:flex; align-items:center; justify-content:center; gap: 14px;
    flex-wrap: wrap;
  }

  button{
    font-family:'Quicksand', sans-serif;
    font-weight: 700;
    border: none;
    cursor: pointer;
    border-radius: 999px;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.2s ease;
  }

  #yesBtn{
    background: var(--cream);
    color: var(--deep-rose);
    font-size: 17px;
    padding: 14px 30px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    transform: scale(1);
  }
  #yesBtn:hover{ transform: scale(1.06); }
  #yesBtn:active{ transform: scale(0.96); }

  #noBtn{
    background: rgba(255,255,255,0.15);
    color: var(--cream);
    border: 1px solid rgba(255,255,255,0.5);
    font-size: 15px;
    padding: 12px 24px;
    white-space: nowrap;
  }
  #noBtn.absolute{
    position: absolute;
  }
  #noBtn.poof{
    animation: poof 0.4s ease forwards;
  }
  @keyframes poof{
    to{ transform: scale(0) rotate(30deg); opacity:0; }
  }

  .sound-toggle{
    display: none;
  }

  /* ---- Screen 2 ---- */
  #screen2{ display:none; }

  #screen2 h2{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(24px, 7.5vw, 30px);
    line-height: 1.2;
    margin: 4px 0 14px;
  }

  .msg{
    font-size: 14.5px;
    line-height: 1.55;
    opacity: 0.95;
    margin: 0 0 22px;
    font-weight: 500;
  }
  .signature{
    display:block; margin-top: 6px; font-family:'Fraunces', serif; font-style: italic; font-weight:600;
  }

  .cat-frame{
    width: 100%;
    max-width: 260px;
    margin: 0 auto 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.4);
    padding: 18px 10px 6px;
  }

  .cat-wrap{
    width: 150px; height: 150px; margin: 0 auto;
  }

  .photo-wrap{
    width: 100%; height: 210px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  .cat-photo{
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  @keyframes catBounce{
    0%, 100%{ transform: translateY(0) rotate(-2deg); }
    50%{ transform: translateY(-8px) rotate(2deg); }
  }

  .tail{ transform-origin: 70px 120px; animation: tailSwish 1.8s ease-in-out infinite; }
  @keyframes tailSwish{
    0%, 100%{ transform: rotate(0deg); }
    50%{ transform: rotate(18deg); }
  }

  .eye{ animation: blink 3.4s ease-in-out infinite; transform-origin: center; }
  @keyframes blink{
    0%, 92%, 100%{ transform: scaleY(1); }
    95%{ transform: scaleY(0.1); }
  }

  .heart-pop{
    position:absolute; font-size: 22px; opacity:0;
    animation: heartPop 2.2s ease-in-out infinite;
  }
  @keyframes heartPop{
    0%{ transform: translateY(0) scale(0.6); opacity:0; }
    30%{ opacity:1; transform: translateY(-16px) scale(1.1); }
    60%{ opacity:1; }
    100%{ transform: translateY(-38px) scale(0.7); opacity:0; }
  }

  .replay{
    background: rgba(255,255,255,0.16);
    color: var(--cream);
    border: 1px solid rgba(255,255,255,0.45);
    padding: 11px 22px;
    font-size: 14px;
  }

  /* confetti */
  .confetti-layer{
    position: fixed; inset:0; pointer-events:none; z-index: 50; overflow:hidden;
  }
  .confetti-piece{
    position:absolute; top:-30px; font-size: 20px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall{
    to{ transform: translateY(110vh) rotate(360deg); opacity: 0.9; }
  }
</style>
</head>

<script>
  // ambient floating hearts
  const ambient = document.getElementById('ambient');
  const emojiSet = ['💗','💕','💖','✨'];
  for(let i=0;i<16;i++){
    const s = document.createElement('span');
    s.textContent = emojiSet[Math.floor(Math.random()*emojiSet.length)];
    s.style.left = (Math.random()*100) + 'vw';
    s.style.setProperty('--drift', (Math.random()*60-30)+'px');
    s.style.animationDuration = (7 + Math.random()*8) + 's';
    s.style.animationDelay = (Math.random()*10) + 's';
    s.style.fontSize = (14 + Math.random()*14) + 'px';
    ambient.appendChild(s);
  }

  // sound (simple synthesized tones, no external asset)
  let soundOn = true;
  const soundToggle = document.getElementById('soundToggle');
  soundToggle.addEventListener('click', ()=>{
    soundOn = !soundOn;
    soundToggle.textContent = soundOn ? '🔊' : '🔇';
  });

  function playTone(freq, duration, type='sine', delay=0){
    if(!soundOn) return;
    try{
      const ctx = playTone._ctx || (playTone._ctx = new (window.AudioContext || window.webkitAudioContext)());
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = 0.06;
      osc.connect(gain); gain.connect(ctx.destination);
      const t0 = ctx.currentTime + delay;
      osc.start(t0);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.stop(t0 + duration + 0.02);
    }catch(e){}
  }
  function playChime(){
    playTone(660, 0.18, 'sine', 0);
    playTone(880, 0.2, 'sine', 0.14);
    playTone(1046, 0.3, 'sine', 0.28);
  }
  function playPoof(){
    playTone(220, 0.12, 'square', 0);
  }

  // dodging "No" button
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const dodgeZone = document.getElementById('dodgeZone');
  const hintText = document.getElementById('hintText');
  let dodgeCount = 0;

  const taunts = [
    "shh, this is a you-only game 😏",
    "nice try 😌",
    "not so fast 😏",
    "you can't catch this one 🙈",
    "come on, just say yes 🥺",
    "okay okay, I'll disappear 😅"
  ];

  function dodge(e){
    e.preventDefault();
    if(dodgeCount >= 6){
      noBtn.classList.add('poof');
      playPoof();
      setTimeout(()=>{ noBtn.style.display='none'; }, 380);
      hintText.textContent = "guess that's a yes then 💕";
      yesBtn.style.transform = 'scale(1.25)';
      return;
    }
    const zoneRect = dodgeZone.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();
    if(!noBtn.classList.contains('absolute')){
      noBtn.classList.add('absolute');
    }
    const padding = 12;
    const maxX = Math.max(zoneRect.width - btnRect.width - padding, padding);
    const maxY = Math.max(zoneRect.height - btnRect.height - padding, padding);
    const x = padding + Math.random() * (maxX - padding);
    const y = padding + Math.random() * (maxY - padding);
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';

    dodgeCount++;
    playPoof();
    hintText.textContent = taunts[Math.min(dodgeCount, taunts.length-1)];
    const scale = Math.min(1 + dodgeCount * 0.06, 1.4);
    yesBtn.style.transform = `scale(${scale})`;
  }

  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('click', dodge);
  noBtn.addEventListener('touchstart', dodge, {passive:false});

  // Yes -> celebration
  const screen1 = document.getElementById('screen1');
  const screen2 = document.getElementById('screen2');
  const card = document.getElementById('card');

  function fireConfetti(){
    const layer = document.createElement('div');
    layer.className = 'confetti-layer';
    document.body.appendChild(layer);
    const pieces = ['💖','💕','🎉','✨','💗','🌸'];
    for(let i=0;i<44;i++){
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.textContent = pieces[Math.floor(Math.random()*pieces.length)];
      p.style.left = (Math.random()*100) + 'vw';
      p.style.fontSize = (14 + Math.random()*16) + 'px';
      p.style.animationDuration = (2.2 + Math.random()*1.8) + 's';
      p.style.animationDelay = (Math.random()*0.6) + 's';
      layer.appendChild(p);
    }
    setTimeout(()=> layer.remove(), 4500);
  }

  function showCelebration(){
    screen1.style.display = 'none';
    screen2.style.display = 'block';
    fireConfetti();
    playChime();
  }

  yesBtn.addEventListener('click', showCelebration);

  document.getElementById('replayBtn').addEventListener('click', ()=>{
    screen2.style.display = 'none';
    screen1.style.display = 'block';
    noBtn.style.display = '';
    noBtn.classList.remove('poof', 'absolute');
    noBtn.style.left = ''; noBtn.style.top = '';
    dodgeCount = 0;
    hintText.textContent = taunts[0];
    yesBtn.style.transform = 'scale(1)';
  });
</script>
